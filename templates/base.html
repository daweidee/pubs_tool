<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}应用{% endblock %}</title>
    <style>
      :root {
        --sidebar-width: 200px;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --space-xs: 0.5rem;
        --space-sm: 0.75rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2rem;
        --space-2xl: 2.5rem;
        --color-bg: #1a1d24;
        --color-surface: #252830;
        --color-surface-elevated: #2d313c;
        --color-border: #3b3f4b;
        --color-text: #e4e6eb;
        --color-text-muted: #9ca3af;
        --color-primary: #7c3aed;
        --color-primary-hover: #8b5cf6;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
        --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-size: 16px; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        min-height: 100vh;
        line-height: 1.5;
      }
      .layout {
        display: flex;
        min-height: 100vh;
      }
      .nav {
        width: var(--sidebar-width);
        flex-shrink: 0;
        background: var(--color-surface);
        border-right: 1px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        display: flex;
        flex-direction: column;
        gap: var(--space-xs);
      }
      .nav-title {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0 var(--space-sm);
        margin-bottom: var(--space-sm);
      }
      .nav a {
        display: block;
        padding: var(--space-sm) var(--space-md);
        border-radius: var(--radius-md);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        color: var(--color-text-muted);
        transition: background 0.2s, color 0.2s;
      }
      .nav a:hover {
        background: var(--color-surface-elevated);
        color: var(--color-text);
      }
      .nav a.active {
        background: var(--color-primary);
        color: white;
      }
      .nav a.active:hover {
        background: var(--color-primary-hover);
        color: white;
      }
      .page-wrap {
        flex: 1;
        min-width: 0;
        padding: var(--space-xl);
        overflow-auto;
      }
      .page {
        max-width: 560px;
        margin: 0 auto;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-2xl);
        box-shadow: var(--shadow-lg);
        min-height: 280px;
      }
      .page-head {
        text-align: center;
        margin-bottom: var(--space-xl);
      }
      .page-head h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-text);
        margin-bottom: var(--space-xs);
      }
      .page-head .subtitle {
        font-size: 0.9rem;
        color: var(--color-text-muted);
      }
      .card {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--space-lg);
      }
      .card + .card { margin-top: var(--space-lg); }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: var(--space-md) var(--space-xl);
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background: var(--color-primary);
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 0.15s, transform 0.15s;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--color-primary-hover);
        transform: translateY(-1px);
      }
      .btn-primary:active:not(:disabled) { transform: translateY(0); }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .feedback {
        margin-top: var(--space-md);
        padding: var(--space-md);
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        text-align: center;
        opacity: 0;
        transition: opacity 0.25s;
      }
      .feedback.show { opacity: 1; }
      .feedback.success { background: #064e3b; color: #6ee7b7; border: 1px solid #047857; }
      .feedback.error { background: #7f1d1d; color: #fca5a5; border: 1px solid #b91c1c; }
      input, select, textarea {
        background: var(--color-surface-elevated);
        color: var(--color-text);
        border-color: var(--color-border);
      }
      input::placeholder, textarea::placeholder {
        color: var(--color-text-muted);
      }
      @media (max-width: 768px) {
        .layout { flex-direction: column; }
        .nav {
          width: 100%;
          flex-direction: row;
          flex-wrap: wrap;
          border-right: none;
          border-bottom: 1px solid var(--color-border);
          padding: var(--space-sm);
        }
        .nav-title { width: 100%; margin-bottom: var(--space-xs); }
        .page-wrap { padding: var(--space-md); }
        .page { padding: var(--space-lg); }
      }
      {% block extra_css %}{% endblock %}
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="layout">
      <nav class="nav">
        <div class="nav-title">功能</div>
        <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' or request.endpoint == 'main.getpassword' %}active{% endif %}">🔐 密码生成器</a>
        <a href="{{ url_for('main.upload_page') }}" class="{% if request.endpoint == 'main.upload_page' %}active{% endif %}">📤 上传到 S3</a>
        <a href="{{ url_for('main.timestamp_page') }}" class="{% if request.endpoint == 'main.timestamp_page' %}active{% endif %}">⏱️ 时间戳转换</a>
      </nav>
      <div class="page-wrap">
        <main class="page">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
